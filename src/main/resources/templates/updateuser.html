<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <div th:replace="~{fragments/header :: head}"></div>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="wrapper">

  <div class="form-section">
    <div class="form-card">

      <div class="form-card-header">
        <h2>Modifier le compte</h2>
        <p th:text="'Mise à jour de ' + ${user.username}">Mise à jour de l'utilisateur</p>
      </div>

      <div class="form-card-body">

        <!-- Erreur globale API -->
        <div th:if="${apiError}" class="alert alert-danger">
          <span class="alert-icon">⚠️</span>
          <span th:text="${apiError}"></span>
        </div>

        <form method="post"
              th:action="@{/saveuser}"
              th:object="${user}"
              enctype="multipart/form-data"
              id="updateForm"
              novalidate>

          <input type="hidden" th:field="*{id}">

          <!-- ── Photo actuelle + modification ── -->
          <div class="form-group full-width mb-2">
            <label>Photo de profil</label>
            <div class="photo-upload-area" id="uploadArea">
              <input type="file" name="photo" id="photoInput" accept="image/*">
              <!-- Photo existante -->
              <img th:if="${user.photoPath != null and !user.photoPath.isEmpty()}"
                   th:src="'http://localhost:8080/' + ${user.photoPath}"
                   id="photoPreview"
                   class="photo-preview"
                   style="display:block;"
                   alt="Photo actuelle">
              <img th:unless="${user.photoPath != null and !user.photoPath.isEmpty()}"
                   id="photoPreview"
                   class="photo-preview"
                   src="#"
                   alt="Aperçu">
              <span class="upload-icon"
                    id="uploadIcon"
                    th:style="${user.photoPath != null and !user.photoPath.isEmpty()} ? 'display:none' : ''">
                📷
              </span>
              <p><strong>Cliquer pour changer</strong> la photo — JPG, PNG, GIF (max 5 Mo)</p>
            </div>
          </div>

          <hr class="form-divider">

          <!-- ── Identité ── -->
          <div class="form-grid">

            <div class="form-group">
              <label for="prenomInput">Prénom</label>
              <input type="text" th:field="*{prenom}" id="prenomInput"
                     th:classappend="${fieldErrors?.containsKey('prenom')} ? 'is-invalid'">
              <span class="field-error" th:if="${fieldErrors?.containsKey('prenom')}">
                ⚠ <span th:text="${fieldErrors['prenom']}"></span>
              </span>
            </div>

            <div class="form-group">
              <label for="nomInput">Nom</label>
              <input type="text" th:field="*{nom}" id="nomInput"
                     th:classappend="${fieldErrors?.containsKey('nom')} ? 'is-invalid'">
              <span class="field-error" th:if="${fieldErrors?.containsKey('nom')}">
                ⚠ <span th:text="${fieldErrors['nom']}"></span>
              </span>
            </div>

            <div class="form-group">
              <label for="usernameInput">Pseudonyme</label>
              <input type="text" th:field="*{username}" id="usernameInput"
                     th:classappend="${fieldErrors?.containsKey('username')} ? 'is-invalid'">
              <span class="field-error" th:if="${fieldErrors?.containsKey('username')}">
                ⚠ <span th:text="${fieldErrors['username']}"></span>
              </span>
            </div>

            <div class="form-group">
              <label for="dateNaissanceInput">Date de naissance</label>
              <input type="date"
                     th:value="${user.dateNaissance != null ? #temporals.format(user.dateNaissance, 'yyyy-MM-dd') : ''}"
                     name="dateNaissance"
                     id="dateNaissanceInput"
                     th:classappend="${fieldErrors?.containsKey('dateNaissance')} ? 'is-invalid'">
              <span class="field-error" th:if="${fieldErrors?.containsKey('dateNaissance')}">
                ⚠ <span th:text="${fieldErrors['dateNaissance']}"></span>
              </span>
            </div>

          </div>

          <hr class="form-divider">

          <!-- ── Email ── -->
          <div class="form-group full-width">
            <label for="emailInput">Adresse e-mail</label>
            <input type="email" th:field="*{email}" id="emailInput"
                   th:classappend="${fieldErrors?.containsKey('email')} ? 'is-invalid'">
            <span class="field-error" th:if="${fieldErrors?.containsKey('email')}">
              ⚠ <span th:text="${fieldErrors['email']}"></span>
            </span>
          </div>

          <hr class="form-divider">

          <!-- ── Nouveau mot de passe (optionnel) ── -->
          <div class="alert alert-info mb-2">
            <span class="alert-icon">ℹ️</span>
            <span>Laissez les champs mot de passe vides pour conserver l'actuel.</span>
          </div>

          <div class="form-grid">

            <div class="form-group">
              <label for="passwordInput">Nouveau mot de passe</label>
              <div class="input-group">
                <input type="password" th:field="*{password}" id="passwordInput"
                       placeholder="Laisser vide = inchangé"
                       th:classappend="${fieldErrors?.containsKey('password')} ? 'is-invalid'"
                       oninput="updateStrength(this.value)">
                <button type="button" class="toggle-password" onclick="togglePwd('passwordInput', this)">👁</button>
              </div>
              <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
              <span class="strength-label" id="strengthLabel"></span>
              <span class="field-error" th:if="${fieldErrors?.containsKey('password')}">
                ⚠ <span th:text="${fieldErrors['password']}"></span>
              </span>
            </div>

            <div class="form-group">
              <label for="confirmPasswordInput">Confirmer le nouveau mot de passe</label>
              <div class="input-group">
                <input type="password" id="confirmPasswordInput"
                       placeholder="Répétez le nouveau mot de passe"
                       oninput="checkConfirm()">
                <button type="button" class="toggle-password" onclick="togglePwd('confirmPasswordInput', this)">👁</button>
              </div>
              <span class="field-error" id="confirmError" style="display:none;">
                ⚠ Les mots de passe ne correspondent pas
              </span>
            </div>

          </div>

          <hr class="form-divider">

          <!-- ── Actions ── -->
          <div class="d-flex gap-2" style="flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
              💾 Enregistrer les modifications
            </button>
            <a href="/" class="btn btn-outline btn-lg">Annuler</a>
          </div>

        </form>
      </div>
    </div>
  </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
  /* ── Aperçu photo ── */
  document.getElementById('photoInput').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('Le fichier dépasse 5 Mo.'); this.value = ''; return; }
    const reader = new FileReader();
    reader.onload = e => {
      const preview = document.getElementById('photoPreview');
      preview.src = e.target.result;
      preview.style.display = 'block';
      document.getElementById('uploadIcon').style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  /* ── Force mot de passe ── */
  function updateStrength(val) {
    if (!val) { document.getElementById('strengthLabel').textContent = ''; return; }
    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[@#$%^&+=!]/.test(val)) score++;
    const levels = [
      { pct: '20%',  color: '#C0392B', text: '🔴 Très faible' },
      { pct: '40%',  color: '#E67E22', text: '🟠 Faible' },
      { pct: '60%',  color: '#F1C40F', text: '🟡 Moyen' },
      { pct: '80%',  color: '#27AE60', text: '🟢 Fort' },
      { pct: '100%', color: '#1E8449', text: '✅ Très fort' },
    ];
    const lvl = levels[Math.min(score - 1, 4)] ?? levels[0];
    const bar = document.getElementById('strengthBar');
    bar.style.width = lvl.pct;
    bar.style.background = lvl.color;
    document.getElementById('strengthLabel').textContent = lvl.text;
    checkConfirm();
  }

  function checkConfirm() {
    const pwd  = document.getElementById('passwordInput').value;
    const conf = document.getElementById('confirmPasswordInput').value;
    if (!conf) { document.getElementById('confirmError').style.display = 'none'; return; }
    const ok = pwd === conf;
    document.getElementById('confirmError').style.display = ok ? 'none' : 'flex';
    document.getElementById('confirmPasswordInput').classList.toggle('is-invalid', !ok);
    document.getElementById('confirmPasswordInput').classList.toggle('is-valid', ok && !!conf);
  }

  function togglePwd(inputId, btn) {
    const input = document.getElementById(inputId);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁';
  }

  document.getElementById('updateForm').addEventListener('submit', function (e) {
    const pwd  = document.getElementById('passwordInput').value;
    const conf = document.getElementById('confirmPasswordInput').value;
    if (pwd && pwd !== conf) {
      e.preventDefault();
      document.getElementById('confirmError').style.display = 'flex';
      document.getElementById('confirmPasswordInput').scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = '⏳ Enregistrement…';
  });
</script>

</body>
</html>
